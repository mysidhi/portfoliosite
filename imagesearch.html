<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- App theme color (status bar color on mobile) -->
  <meta name="theme-color" content="#0f172a" />
  <title>Image Search</title>

  <style>
    /* ===== Global Styles ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    :root {
      --bg-body: #0c0c0d;
      --bg-card: #0f172a;
      --bg-header: rgba(15, 23, 42, 0.95);
      --accent: #38bdf8;
      --accent-soft: rgba(56, 189, 248, 0.15);
      --text-main: #e5e7eb;
      --text-muted: #9ca3af;
      --border-soft: rgba(148, 163, 184, 0.3);
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at top, #000000, #000000 55%);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .wrapper {
      width: 100%;
      max-width: 1200px;
    }

    /* ===== Header ===== */
    header {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 25px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      background: linear-gradient(135deg, #38bdf8, #4f46e5);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 18px;
      color: #0b1120;
      box-shadow: 0 10px 30px rgba(56, 189, 248, 0.5);
    }

    .logo-text {
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: 0.03em;
    }

    .subtitle {
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    /* ===== Search Area ===== */
    .search-area {
      margin-bottom: 20px;
      background: rgba(15, 23, 42, 0.9);
      border-radius: 18px;
      padding: 14px 16px;
      border: 1px solid var(--border-soft);
      backdrop-filter: blur(12px);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .search-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .search-input-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      background: radial-gradient(circle at top left, var(--accent-soft), #020617);
      border-radius: 999px;
      padding: 8px 12px;
      border: 1px solid rgba(148, 163, 184, 0.4);
    }

    .search-icon {
      font-size: 1rem;
      opacity: 0.8;
    }

    #searchInput {
      border: none;
      outline: none;
      background: transparent;
      color: var(--text-main);
      width: 100%;
      font-size: 0.95rem;
    }

    #searchInput::placeholder {
      color: var(--text-muted);
    }

    #searchBtn {
      border: none;
      outline: none;
      padding: 9px 18px;
      border-radius: 999px;
      background: linear-gradient(135deg, #38bdf8, #4f46e5);
      color: #f9fafb;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(56, 189, 248, 0.4);
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    #searchBtn:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 36px rgba(56, 189, 248, 0.6);
    }

    .filter-info {
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    /* ===== Gallery Grid ===== */
    #gallery {
      margin-top: 10px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }

    .placeholder-text {
      grid-column: 1 / -1;
      text-align: center;
      font-size: 0.9rem;
      color: var(--text-muted);
      padding: 30px 0;
    }

    .photo-card {
      background: var(--bg-card);
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(148, 163, 184, 0.25);
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.9);
      display: flex;
      flex-direction: column;
      transition: transform 0.2s ease, box-shadow 0.2s ease,
        border-color 0.2s ease;
      position: relative;
    }

    .photo-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        135deg,
        rgba(56, 189, 248, 0.15),
        transparent 40%,
        rgba(76, 29, 149, 0.2)
      );
      opacity: 0;
      transition: opacity 0.2s ease;
      pointer-events: none;
    }

    .photo-card:hover {
      transform: translateY(-6px) scale(1.01);
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.9);
      border-color: rgba(56, 189, 248, 0.6);
    }

    .photo-card:hover::before {
      opacity: 1;
    }

    .photo-card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      display: block;
    }

    .photo-info {
      padding: 10px 12px 12px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
    }

    .photo-info p {
      color: var(--text-muted);
    }

    .photo-info a {
      color: var(--accent);
      text-decoration: none;
    }

    .photo-info a:hover {
      text-decoration: underline;
    }

    .download-btn {
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.5);
      font-size: 0.75rem;
      text-decoration: none;
      color: #e5e7eb;
      background: rgba(15, 23, 42, 0.9);
      white-space: nowrap;
    }

    .download-btn:hover {
      border-color: var(--accent);
    }

    /* ===== Footer ===== */
    footer {
      margin-top: 24px;
      font-size: 0.75rem;
      color: var(--text-muted);
      text-align: center;
      opacity: 0.8;
    }

    /* ===== Responsive ===== */
    @media (max-width: 600px) {
      header {
        align-items: flex-start;
      }

      .logo-text {
        font-size: 1.2rem;
      }

      .search-area {
        padding: 10px 12px;
      }

      .photo-card img {
        height: 180px;
      }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <!-- ===== Header ===== -->
    <header>
      <div class="logo">
        <div class="logo-icon">IS</div>
        <div class="logo-text">Image Search</div>
      </div>
      <p class="subtitle">
       
      </p>
    </header>

    <!-- ===== Search Area ===== -->
    <section class="search-area">
      <div class="search-row">
        <div class="search-input-wrap">
          <span class="search-icon">🔍</span>
          <input
            type="text"
            id="searchInput"
            placeholder="Search images "
          />
        </div>
        <button id="searchBtn">
          Search
        </button>
      </div>
      <p class="filter-info">
       
      </p>
    </section>

    <!-- ===== Gallery ===== -->
    <main id="gallery">
      <p class="placeholder-text">
       
      </p>
    </main>

    <!-- ===== Footer ===== -->
    <footer>
     
    </footer>
  </div>

  <!-- ===== JavaScript (Unsplash API) ===== -->
  <script>
    const accessKey = "TnQEK1nmd8984iq5wl69lQyXABZchMGd8ZZAt0iVOm0"; // ⚠️ Replace with your Unsplash Access Key

    const searchBtn = document.getElementById("searchBtn");
    const searchInput = document.getElementById("searchInput");
    const gallery = document.getElementById("gallery");

    function searchImages() {
      const query = searchInput.value.trim();
      if (!query) {
        alert("Please enter a search term!");
        return;
      }

      gallery.innerHTML = `<p class="placeholder-text">Searching images for "<b>${query}</b>"...</p>`;

      const url = `https://api.unsplash.com/search/photos?query=${encodeURIComponent(
        query
      )}&per_page=12&client_id=${accessKey}`;

      fetch(url)
        .then((res) => res.json())
        .then((data) => {
          gallery.innerHTML = "";

          if (!data.results || data.results.length === 0) {
            gallery.innerHTML = `<p class="placeholder-text">No images found for "<b>${query}</b>" 😢</p>`;
            return;
          }

          data.results.forEach((photo) => {
            gallery.innerHTML += `
              <div class="photo-card">
                <img src="${photo.urls.small}" alt="${photo.alt_description || "Unsplash Photo"}">
                <div class="photo-info">
                  <p>By <a href="${photo.user.links.html}" target="_blank">@${photo.user.username}</a></p>
                  <a class="download-btn" href="${photo.links.download}" target="_blank">⬇ Download</a>
                </div>
              </div>
            `;
          });
        })
        .catch((err) => {
          console.error("Error fetching images:", err);
          gallery.innerHTML = `<p class="placeholder-text">Something went wrong 😕</p>`;
        });
    }

    // Click on button
    searchBtn.addEventListener("click", searchImages);

    // Press Enter key
    searchInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        searchImages();
      }
    });
  </script>
</body>
</html>
